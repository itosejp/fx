<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ドル円 読み上げ</title>

<style>
body{
background:#0a0a12;
color:#e8e8f2;
font-family:sans-serif;
text-align:center;
padding:20px;
}

.rate{
font-size:64px;
font-weight:900;
margin-top:20px;
}

.btn{
margin-top:20px;
padding:14px 24px;
font-size:18px;
border:none;
border-radius:10px;
background:#00e5a0;
}

.log{
margin-top:20px;
max-width:320px;
margin-left:auto;
margin-right:auto;
font-size:14px;
}
</style>
</head>

<body>

<h2>USD / JPY</h2>

<div class="rate" id="rate">---</div>

<button class="btn" onclick="toggle()">自動読み上げ</button>

<div class="log" id="log"></div>

<script>

var running=false
var lastRate=null
var timer=null

var KANA=['ぜろ','いち','にぃ','さん','よん','ごー','ろく','なな','はち','きゅう']

function numText(v){

var s=v.toFixed(3)
var p=s.split('.')

var r=''

for(var i=0;i<p[0].length;i++){
r+=KANA[parseInt(p[0][i])]
}

r+=' てん '

for(var j=0;j<p[1].length;j++){
r+=KANA[parseInt(p[1][j])]
}

return r

}

function diffText(diff){

var s=Math.abs(diff).toFixed(3)

var p=s.split('.')

var r=''

for(var i=0;i<p[0].length;i++){
r+=KANA[parseInt(p[0][i])]
}

r+=' てん '

for(var j=0;j<p[1].length;j++){
r+=KANA[parseInt(p[1][j])]
}

return r

}

function speak(text){

if(!window.speechSynthesis)return

if(window.speechSynthesis.speaking){
window.speechSynthesis.cancel()
}

var u=new SpeechSynthesisUtterance(text)

u.lang='ja-JP'
u.rate=0.85

window.speechSynthesis.speak(u)

}

function fetchRate(){

fetch("https://api.frankfurter.app/latest?from=USD&to=JPY")

.then(r=>r.json())

.then(d=>{

var rate=d.rates.JPY

update(rate)

})

.catch(()=>{

log("取得失敗")

})

}

function update(rate){

document.getElementById("rate").innerText=rate.toFixed(3)

var prev=lastRate

var txt=numText(rate)

if(prev!=null){

var diff=rate-prev

if(diff>0){

txt+="。ぷらす "+diffText(diff)

}

else if(diff<0){

txt+="。まいなす "+diffText(diff)

}

else{

txt+="。へんかなし"

}

if(diff>=0.03){
txt="急騰です。"+txt
}

if(diff<=-0.03){
txt="急落です。"+txt
}

}

speak(txt)

log(rate.toFixed(3))

lastRate=rate

}

function log(t){

var el=document.getElementById("log")

var d=document.createElement("div")

d.innerText=new Date().toLocaleTimeString()+"  "+t

el.prepend(d)

}

function toggle(){

running=!running

if(running){

fetchRate()

timer=setInterval(fetchRate,10000)

}

else{

clearInterval(timer)

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ドル円 読み上げ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;color:#e8e8f2;font-family:'Hiragino Sans',sans-serif;display:flex;justify-content:center}
.wrap{width:100%;max-width:420px;padding:16px 12px 60px;display:flex;flex-direction:column;gap:10px}
.hdr{text-align:center;font-size:20px;letter-spacing:3px;color:#fff;opacity:.3;font-weight:300}
.rcard{background:#10101a;border:1px solid #1a1a2e;border-radius:16px;padding:18px;text-align:center}
.rnum{font-size:66px;font-weight:900;color:#00e5a0;line-height:1}
.rnum.dn{color:#ff4560}
.rdec{font-size:34px;opacity:.75}
.rdiff{font-size:15px;margin-top:6px;color:#4a4a6a;min-height:22px}
.rdiff.up{color:#00b8ff}.rdiff.dn{color:#ff4560}
.chart-wrap{background:#10101a;border:1px solid #1a1a2e;border-radius:14px;overflow:hidden}
.chart-hdr{padding:8px 12px;font-size:10px;letter-spacing:2px;color:#4a4a6a;border-bottom:1px solid #1a1a2e}
.chart-wrap iframe{width:100%;height:220px;border:none;display:block}
.trow{background:#10101a;border:1px solid #1a1a2e;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.ring{position:relative;width:40px;height:40px;flex-shrink:0}
.rsvg{width:40px;height:40px;transform:rotate(-90deg)}
.rtrk{fill:none;stroke:#1a1a2e;stroke-width:3}
.rprg{fill:none;stroke:#00e5a0;stroke-width:3;stroke-linecap:round;stroke-dasharray:101;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .3s}
.rn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;font-weight:900;color:#00e5a0}
.tlbl{font-size:10px;letter-spacing:1px;color:#4a4a6a}
.tst{font-size:13px;margin-top:2px}
.lcard{background:#10101a;border:1px solid #1a1a2e;border-radius:12px;overflow:hidden}
.lhdr{padding:8px 12px;border-bottom:1px solid #1a1a2e;font-size:10px;letter-spacing:2px;color:#4a4a6a}
.llist{max-height:110px;overflow-y:auto}
.litem{display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid #0d0d1a;font-size:12px}
.ltm{color:#4a4a6a;font-size:10px}
.lrt{font-size:16px;font-weight:900}
.lrt.up{color:#00b8ff}.lrt.dn{color:#ff4560}.lrt.nc{color:#e8e8f2}
.ldf{font-size:11px;min-width:52px;text-align:right}
.bmain{width:100%;padding:16px;background:linear-gradient(135deg,#00e5a0,#00c87a);border:none;border-radius:13px;color:#080810;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:inherit}
.bmain.on{background:linear-gradient(135deg,#1a1a2e,#222240);color:#ff4560;border:1px solid rgba(255,69,96,.3)}
.bonce{width:100%;padding:11px;background:transparent;border:1px solid #1a1a2e;border-radius:12px;color:#e8e8f2;font-size:13px;cursor:pointer;font-family:inherit}
.err{color:#ff4560;font-size:11px;text-align:center;min-height:14px}
.note{font-size:11px;color:#4a4a6a;text-align:center}
.note b{color:#ffb300}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">ドル円 読み上げ</div>

  <div class="rcard">
    <div class="rnum" id="rnum">---<span class="rdec">.---</span></div>
    <div class="rdiff" id="rdiff">USD / JPY</div>
  </div>

  <div class="chart-wrap">
    <div class="chart-hdr">TRADINGVIEW チャート</div>
    <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tv&symbol=FX%3AUSDJPY&interval=5&hidesidetoolbar=1&hidetoptoolbar=1&symboledit=0&saveimage=0&toolbarbg=080810&studies=MAExp%4020&theme=dark&style=8&timezone=Asia%2FTokyo&withdateranges=0&hide_side_toolbar=1&allow_symbol_change=0&calendar=0&hotlist=0&news=0" allowtransparency="true" frameborder="0"></iframe>
  </div>

  <div class="trow">
    <div class="ring">
      <svg class="rsvg" viewBox="0 0 40 40">
        <circle class="rtrk" cx="20" cy="20" r="16"/>
        <circle class="rprg" id="rprg" cx="20" cy="20" r="16"/>
      </svg>
      <div class="rn" id="rn">10</div>
    </div>
    <div>
      <div class="tlbl">次の更新まで</div>
      <div class="tst" id="tst">待機中</div>
    </div>
  </div>

  <div class="lcard">
    <div class="lhdr">更新履歴</div>
    <div class="llist" id="llist">
      <div class="litem" style="color:#4a4a6a;justify-content:center">開始ボタンを押してください</div>
    </div>
  </div>

  <button class="bmain" id="bmain" onclick="toggle()">▶ 自動読み上げ 開始</button>
  <button class="bonce" onclick="once()">今すぐ1回読み上げ</button>
  <div class="err" id="err"></div>
  <div class="note" id="note"><b>最初に「自動読み上げ 開始」をタップ</b><br>すると音声が有効になります</div>
</div>
<script>
var running = false;
var iv = null;   // setInterval handle - 止まらない
var cd = 10;
var cdTmr = null;
var last = null;
var CIRC = 101;
var lastMin5 = -1;
var fetching = false;  // 二重fetch防止

// ---- 数字読み ----
var DEC=['ぜろ','いち','にぃ','さん','よん','ごー','ろく','なな','はち','きゅう'];
function numJp(n){
  if(!n||n===0) return 'ぜろ';
  var O=['','いち','にぃ','さん','よん','ご','ろく','なな','はち','きゅう'];
  var J=['','じゅう','にぃじゅう','さんじゅう','よんじゅう','ごじゅう','ろくじゅう','ななじゅう','はちじゅう','きゅうじゅう'];
  var H=['','ひゃく','にぃひゃく','さんびゃく','よんひゃく','ごひゃく','ろっぴゃく','ななひゃく','はっぴゃく','きゅうひゃく'];
  var r='', t=Math.floor(n/1000);
  if(t===1) r+='せん'; else if(t>1) r+=O[t]+'せん';
  r+=H[Math.floor((n%1000)/100)]+J[Math.floor((n%100)/10)];
  if(n%10) r+=O[n%10];
  return r;
}
function rateJp(rate){
  var s=rate.toFixed(3).split('.');
  var r=numJp(parseInt(s[0]))+' てん ';
  for(var i=0;i<s[1].length;i++) r+=DEC[parseInt(s[1][i])];
  return r;
}
function diffJp(d){
  var v=Math.round(Math.abs(d)*1000);
  if(!v) return '';
  return (d>0?'ぷらす':'まいなす')+numJp(v);
}
function timeJp(){
  var n=new Date(),h=n.getHours(),m=n.getMinutes();
  return 'げんざい'+numJp(h)+'じ'+(m?numJp(m)+'ふん':'ちょうど')+'です';
}

// ---- 音声 ----
var actx=null;
function initAudio(){
  if(actx) return;
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    var b=actx.createBuffer(1,1,22050),s=actx.createBufferSource();
    s.buffer=b; s.connect(actx.destination); s.start(0);
  }catch(e){}
  if(window.speechSynthesis){
    var u=new SpeechSynthesisUtterance('');
    u.volume=0; u.lang='ja-JP'; speechSynthesis.speak(u);
  }
  document.getElementById('note').style.display='none';
}
function say(txt){
  if(!window.speechSynthesis||!txt) return;
  speechSynthesis.cancel();
  if(actx&&actx.state==='suspended') actx.resume();
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='ja-JP'; u.rate=0.88; u.volume=1.0;
  speechSynthesis.resume();
  speechSynthesis.speak(u);
  var k=setInterval(function(){
    if(!speechSynthesis.speaking){clearInterval(k);return;}
    speechSynthesis.pause(); speechSynthesis.resume();
  },5000);
}

// ---- API ----
function get(url,done,fail){
  var x=new XMLHttpRequest();
  x.open('GET',url,true); x.timeout=7000;
  x.onreadystatechange=function(){
    if(x.readyState!==4) return;
    if(x.status===200) done(x.responseText); else fail();
  };
  x.ontimeout=fail; x.onerror=fail; x.send();
}
function fetchRate(cb){
  // Finnhub REST (リアルタイム・数秒更新)
  get('https://finnhub.io/api/v1/quote?symbol=OANDA%3AUSD_JPY&token=d6l3mlpr01qptf3ompl0d6l3mlpr01qptf3omplg',
    function(t){try{var d=JSON.parse(t),v=d.c||d.l;if(v>50&&v<300){cb(null,+v);return;}}catch(e){}api2(cb);},
    function(){api2(cb);});
}
function api2(cb){
  // Finnhub 別シンボル試行
  get('https://finnhub.io/api/v1/forex/rates?base=USD&token=d6l3mlpr01qptf3ompl0d6l3mlpr01qptf3omplg',
    function(t){try{var d=JSON.parse(t),v=d.quote&&d.quote.JPY;if(v>50&&v<300){cb(null,+v);return;}}catch(e){}api3(cb);},
    function(){api3(cb);});
}
function api3(cb){
  get('https://latest.currency-api.pages.dev/v1/currencies/usd.json',
    function(t){try{var d=JSON.parse(t),v=d.usd&&d.usd.jpy;if(v>50&&v<300){cb(null,+v);return;}}catch(e){}api4(cb);},
    function(){api4(cb);});
}
function api4(cb){
  get('https://open.er-api.com/v6/latest/USD',
    function(t){try{var d=JSON.parse(t),v=d.rates&&d.rates.JPY;if(v>50&&v<300){cb(null,+v);return;}}catch(e){}cb('全API失敗',null);},
    function(){cb('全API失敗',null);});
}

// ---- メイン ----
function doFetch(){
  if(fetching) return;  // 二重防止
  fetching=true;
  document.getElementById('err').textContent='';
  fetchRate(function(err,rate){
    fetching=false;
    if(err||!rate){document.getElementById('err').textContent='取得失敗';return;}
    var prev=last, diff=prev!==null?rate-prev:0;
    last=rate;
    // 画面
    var s=rate.toFixed(3).split('.');
    var el=document.getElementById('rnum');
    el.innerHTML=s[0]+'<span class="rdec">.'+s[1]+'</span>';
    el.className='rnum'+(diff<-0.001?' dn':'');
    var de=document.getElementById('rdiff');
    if(prev!==null){
      de.textContent=(diff>=0?'+':'')+diff.toFixed(3)+' 円';
      de.className='rdiff'+(diff>0.001?' up':diff<-0.001?' dn':'');
    }
    addLog(rate,diff,prev);
    // 読み上げ
    var txt=rateJp(rate);
    if(prev!==null&&Math.abs(diff)>=0.001) txt+='。'+diffJp(diff);
    var m=new Date().getMinutes();
    if(m%5===0&&m!==lastMin5){lastMin5=m; txt+='。'+timeJp();}
    say(txt);
  });
}

function addLog(rate,diff,prev){
  var list=document.getElementById('llist');
  if(list.children.length===1&&list.children[0].style.justifyContent==='center') list.innerHTML='';
  while(list.children.length>=15) list.removeChild(list.lastChild);
  var now=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var cls=diff>0.001?'up':diff<-0.001?'dn':'nc';
  var dcol=cls==='up'?'#00b8ff':cls==='dn'?'#ff4560':'#4a4a6a';
  var d=document.createElement('div'); d.className='litem';
  d.innerHTML='<span class="ltm">'+now+'</span>'
    +'<span class="lrt '+cls+'">'+rate.toFixed(3)+'</span>'
    +'<span class="ldf" style="color:'+dcol+'">'+(prev!==null?(diff>=0?'+':'')+diff.toFixed(3):'')+'</span>';
  list.insertBefore(d,list.firstChild);
}

// カウントダウン
function startCD(){
  clearInterval(cdTmr);
  cd=10;
  upRing();
  cdTmr=setInterval(function(){
    cd--; upRing();
    if(cd<=0) cd=10;  // リセット（setIntervalで自動更新）
  },1000);
}
function upRing(){
  document.getElementById('rn').textContent=cd;
  document.getElementById('rprg').style.strokeDashoffset=CIRC*(1-cd/10);
  var hot=cd<=3;
  document.getElementById('rprg').style.stroke=hot?'#ff4560':'#00e5a0';
  document.getElementById('rn').style.color=hot?'#ff4560':'#00e5a0';
}

function toggle(){
  initAudio();
  if(running){stop();}else{start();}
}
function start(){
  running=true;
  document.getElementById('bmain').textContent='■ 自動読み上げ 停止';
  document.getElementById('bmain').className='bmain on';
  document.getElementById('tst').textContent='10秒ごとに更新中';
  doFetch();
  startCD();
  // setIntervalで確実に10秒ごと実行（止まらない）
  iv=setInterval(function(){
    cd=10;
    doFetch();
  },10000);
}
function stop(){
  running=false;
  clearInterval(iv); clearInterval(cdTmr); iv=null;
  document.getElementById('bmain').textContent='▶ 自動読み上げ 開始';
  document.getElementById('bmain').className='bmain';
  document.getElementById('tst').textContent='停止中';
  cd=10; upRing();
}
function once(){ initAudio(); doFetch(); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>USDJPY Voice</title>
    <style>
        :root{--bg:#0a0a12;--card:#161625;--green:#00ffa3;--red:#ff4d6d;--txt:#ffffff;--dim:#888}
        body{background:var(--bg);color:var(--txt);font-family:sans-serif;display:flex;justify-content:center;padding:20px}
        .container{width:100%;max-width:400px;background:var(--card);padding:20px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
        .label{font-size:12px;color:var(--dim);letter-spacing:2px}
        .price{font-size:54px;font-weight:bold;margin:10px 0;font-variant-numeric: tabular-nums}
        .diff{font-size:20px;margin-bottom:20px;height:24px}
        .up{color:var(--green)}
        .down{color:var(--red)}
        button{width:100%;padding:15px;border-radius:12px;border:none;background:var(--green);color:#000;font-weight:bold;font-size:16px;cursor:pointer;margin-bottom:10px}
        button:active{opacity:0.8}
        #log{margin-top:20px;text-align:left;font-size:12px;color:var(--dim);max-height:100px;overflow-y:auto;border-top:1px solid #333;padding-top:10px}
    </style>
</head>
<body>
    <div class="container">
        <div class="label">USD / JPY</div>
        <div id="price" class="price">---.--</div>
        <div id="diff" class="diff"></div>
        <button id="startBtn">▶ 自動読み上げ 開始</button>
        <div id="status" style="font-size:10px; color:var(--dim)">停止中</div>
        <div id="log"></div>
    </div>

<script>
    let lastRate = null;
    let timer = null;
    const KANA = ['ぜろ','いち','にぃ','さん','よん','ごー','ろく','なな','はち','きゅう'];

    // 数値を日本語の読み上げテキストに変換
    function getRateReading(rate) {
        const parts = rate.toFixed(3).split('.');
        let text = "";
        for(let c of parts[0]) text += KANA[parseInt(c)];
        text += " てん ";
        for(let c of parts[1]) text += KANA[parseInt(c)];
        return text;
    }

    // 変動値の読み上げテキスト作成
    function getDiffReading(current, last) {
        if (!last) return "";
        const diffPips = Math.round((current - last) * 1000);
        if (diffPips === 0) return "。変化なし。";

        const sign = diffPips > 0 ? "プラス" : "マイナス";
        const val = Math.abs(diffPips);
        
        let valText = "";
        if (val === 5) valText = "ごー";
        else if (val === 15) valText = "じゅうご";
        else {
            for(let c of val.toString()) valText += KANA[parseInt(c)];
        }
        return `。${sign}${valText}。`;
    }

    // 音声合成
    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        uttr.rate = 1.1; // 少し速め
        window.speechSynthesis.speak(uttr);
    }

    // メインの取得処理
    async function updateRate() {
        try {
            // 代替APIを含むフェッチ（Finnhubがダメな場合も想定）
            const response = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await response.json();
            const rate = data.rates.JPY;

            if (!rate) throw new Error("Invalid data");

            const priceEl = document.getElementById('price');
            const diffEl = document.getElementById('diff');
            
            // 画面表示更新
            priceEl.textContent = rate.toFixed(3);
            
            let speechTxt = getRateReading(rate);
            
            if (lastRate !== null) {
                const d = rate - lastRate;
                const pips = Math.round(d * 1000);
                diffEl.textContent = (pips > 0 ? "+" : "") + pips + " pts";
                diffEl.className = "diff " + (pips >= 0 ? "up" : "down");
                speechTxt += getDiffReading(rate, lastRate);
            }

            speak(speechTxt);
            
            // ログ記録
            const log = document.getElementById('log');
            log.innerHTML = `<div>${new Date().toLocaleTimeString()} : ${rate.toFixed(3)}</div>` + log.innerHTML;
            
            lastRate = rate;

        } catch (e) {
            document.getElementById('status').textContent = "取得エラー: " + e.message;
        }
    }

    // ボタン操作
    document.getElementById('startBtn').addEventListener('click', function() {
        if (timer) {
            clearInterval(timer);
            timer = null;
            this.textContent = "▶ 自動読み上げ 開始";
            this.style.background = "#00ffa3";
            document.getElementById('status').textContent = "停止中";
        } else {
            // iOS等のブラウザ対策：クリックイベント内で一度空の音声を出す
            speak(""); 
            updateRate();
            timer = setInterval(updateRate, 10000); // 10秒おき
            this.textContent = "■ 停止";
            this.style.background = "#ff4d6d";
            document.getElementById('status').textContent = "10秒ごとに更新中...";
        }
    });
</script>
</body>
</html>

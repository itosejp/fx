<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>USDJPY Monitor</title>

<style>
body{
font-family:Arial;
background:#111;
color:#0f0;
text-align:center;
padding-top:60px;
}

#price{
font-size:70px;
margin:20px;
}

#change{
font-size:40px;
}
</style>
</head>

<body>

<h1>USDJPY</h1>

<div id="price">---</div>
<div id="change">---</div>

<script>

let prevPrice = null;

function speak(text){

const msg = new SpeechSynthesisUtterance(text);
msg.lang="ja-JP";

speechSynthesis.cancel();
speechSynthesis.speak(msg);

}

async function getPrice(){

try{

const res = await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=usd&vs_currencies=jpy"
);

const data = await res.json();

const price = data.usd.jpy;

document.getElementById("price").innerText =
price.toFixed(3);

if(prevPrice !== null){

const diff = price - prevPrice;

document.getElementById("change").innerText =
(diff>0?"+":"")+diff.toFixed(3);

if(Math.abs(diff) >= 0.01){

if(diff>0){
speak("プラス " + diff.toFixed(2));
}else{
speak("マイナス " + Math.abs(diff).toFixed(2));
}

}

}

prevPrice = price;

}catch(e){

console.log("API error",e);

}

}

getPrice();

setInterval(getPrice,10000);

</script>

</body>
</html>

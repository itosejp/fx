<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ドル円 読み上げ</title>
<style>
body{
background:#0b0b14;
color:white;
font-family:sans-serif;
text-align:center;
padding:40px
}

.price{
font-size:70px;
font-weight:900;
margin:20px
}

.diff{
font-size:24px;
margin:10px
}

button{
font-size:20px;
padding:12px 20px;
margin:10px
}
</style>
</head>

<body>

<h2>USD/JPY 読み上げ</h2>

<div class="price" id="price">---</div>
<div class="diff" id="diff"></div>

<button onclick="start()">開始</button>
<button onclick="stop()">停止</button>

<script>

let lastRate=null
let timer=null

function speak(text){

if(!speechSynthesis)return

let u=new SpeechSynthesisUtterance(text)
u.lang="ja-JP"
u.rate=0.9

speechSynthesis.cancel()
speechSynthesis.speak(u)

}

function rateText(r){

let s=r.toFixed(3)

return s.replace(".","てん")

}

async function fetchRate(){

try{

// -------- Finnhub --------
let r=await fetch("https://finnhub.io/api/v1/quote?symbol=OANDA:USD_JPY&token=d6l3mlpr01qptf3ompl0d6l3mlpr01qptf3omplg")

let d=await r.json()

if(d.c){

return d.c

}

}catch(e){}

try{

// -------- backup API --------

let r=await fetch("https://api.exchangerate.host/convert?from=USD&to=JPY")

let d=await r.json()

return d.result

}catch(e){}

return null

}

async function update(){

let rate=await fetchRate()

if(!rate)return

document.getElementById("price").innerText=rate.toFixed(3)

if(lastRate!==null){

let diff=rate-lastRate

document.getElementById("diff").innerText=

(diff>0?"+":"")+diff.toFixed(3)

speak(

rateText(rate)+"。"+
(diff>=0?"プラス":"マイナス")+
Math.abs(diff).toFixed(3)

)

}else{

speak(rateText(rate))

}

lastRate=rate

}

function start(){

if(timer)return

update()

timer=setInterval(update,10000)

}

function stop(){

clearInterval(timer)

timer=null

}

</script>

</body>
</html>

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ドル円 読み上げ</title>
<style>
:root{--bg:#080810;--sf:#10101a;--sf2:#16162a;--green:#00e5a0;--blue:#00b8ff;--red:#ff4560;--yellow:#ffb300;--txt:#e8e8f2;--dim:#4a4a6a;--bd:#1a1a2e}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:420px;padding:16px 14px 48px;display:flex;flex-direction:column;gap:10px}
.hdr{text-align:center;padding:4px 0 8px}
.hdr-s{font-size:10px;letter-spacing:5px;color:var(--green);opacity:.7;text-transform:uppercase}
.hdr-t{font-size:20px;letter-spacing:3px;color:var(--txt);opacity:.35;font-weight:300}
.rcard{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:20px 16px 16px;text-align:center;transition:border-color .4s,box-shadow .4s}
.rcard.bull{border-color:rgba(0,229,160,.5);box-shadow:0 0 24px rgba(0,229,160,.1)}
.rcard.bear{border-color:rgba(255,69,96,.5);box-shadow:0 0 24px rgba(255,69,96,.1)}
.pair{font-size:10px;letter-spacing:4px;color:var(--dim);margin-bottom:6px}
.rnum{font-size:64px;line-height:1;font-weight:900;letter-spacing:-1px;color:var(--green);transition:color .3s}
.rnum.bear{color:var(--red)}
.rnum.loading{color:var(--dim)}
.rdec{font-size:34px;opacity:.75}
.badges{display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap;min-height:24px}
.badge{padding:3px 10px;border-radius:16px;font-size:12px;font-weight:700;display:none}
.badge.show{display:inline-block}
.bchg.up{background:rgba(0,229,160,.15);color:var(--green)}
.bchg.dn{background:rgba(255,69,96,.15);color:var(--red)}
.bchg.nc{background:rgba(74,74,106,.2);color:var(--dim)}
.bsrg{background:rgba(255,179,0,.18);color:var(--yellow);font-size:13px}
.sbar{display:flex;align-items:flex-end;gap:3px;height:18px;opacity:0;transition:opacity .3s}
.sbar.on{opacity:1}
.sb{width:3px;border-radius:2px;background:var(--blue);animation:sd .45s ease-in-out infinite alternate}
.sb:nth-child(1){height:6px;animation-delay:0s}
.sb:nth-child(2){height:13px;animation-delay:.08s}
.sb:nth-child(3){height:10px;animation-delay:.16s}
.sb:nth-child(4){height:18px;animation-delay:.12s}
.sb:nth-child(5){height:8px;animation-delay:.04s}
@keyframes sd{from{transform:scaleY(.3);opacity:.4}to{transform:scaleY(1);opacity:1}}
.trow{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:12px}
.ring{position:relative;width:42px;height:42px;flex-shrink:0}
.rsvg{width:42px;height:42px;transform:rotate(-90deg)}
.rtrk{fill:none;stroke:var(--bd);stroke-width:3}
.rprg{fill:none;stroke:var(--green);stroke-width:3;stroke-linecap:round;stroke-dasharray:113;transition:stroke-dashoffset 1s linear,stroke .3s}
.rn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:900;color:var(--green);line-height:1;transition:color .3s}
.tlbl{font-size:10px;letter-spacing:1px;color:var(--dim);text-transform:uppercase}
.tst{font-size:13px;color:var(--txt);margin-top:2px}
.lcard{background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.lhdr{padding:9px 14px;border-bottom:1px solid var(--bd);font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pd 2s infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.llist{max-height:110px;overflow-y:auto}
.litem{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid rgba(26,26,46,.5);font-size:12px}
.ltm{color:var(--dim);font-size:10px}
.lrt{font-size:17px;font-weight:900}
.lrt.up{color:var(--green)}.lrt.dn{color:var(--red)}.lrt.nc{color:var(--txt)}
.ldf{font-size:11px;min-width:50px;text-align:right}
.bmain{width:100%;padding:16px;background:linear-gradient(135deg,#00e5a0,#00c87a);border:none;border-radius:14px;color:#080810;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer}
.bmain.active{background:linear-gradient(135deg,#1a1a2e,#222240);color:var(--red);border:1px solid rgba(255,69,96,.3)}
.bonce{width:100%;padding:12px;background:transparent;border:1px solid var(--bd);border-radius:13px;color:var(--txt);font-family:inherit;font-size:13px;font-weight:300;letter-spacing:1px;cursor:pointer}
.err{color:var(--red);font-size:11px;text-align:center;min-height:14px;padding:0 8px}
.note{font-size:11px;color:var(--dim);text-align:center;line-height:1.8}
.note b{color:var(--yellow)}

/* 変動値読み上げパネル */
.vcard{background:var(–sf);border:1px solid var(–bd);border-radius:14px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.vlbl{font-size:10px;letter-spacing:1px;color:var(–dim);text-transform:uppercase}
.vval{font-size:20px;font-weight:900;color:var(–dim);transition:color .3s}
.vval.up{color:var(–green)}.vval.dn{color:var(–red)}
.vspeech{font-size:10px;color:var(–dim);margin-top:2px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>

</head>
<body>
<div class="wrap">
<div class="hdr"><div class="hdr-s">Live Forex</div><div class="hdr-t">ドル円 読み上げ</div></div>
<div class="rcard" id="rcard">
  <div class="pair">USD / JPY</div>
  <div class="rnum loading" id="rnum">---<span class="rdec">.---</span></div>
  <div class="badges">
    <div class="badge bchg" id="bchg"></div>
    <div class="badge bsrg" id="bsrg"></div>
  </div>
  <div class="sbar" id="sbar" style="justify-content:center;margin-top:6px">
    <div class="sb"></div><div class="sb"></div><div class="sb"></div>
    <div class="sb"></div><div class="sb"></div>
  </div>
</div>

<!-- 変動値パネル -->

<div class="vcard" id="vcard">
  <div>
    <div class="vlbl">前回比 変動</div>
    <div class="vval" id="vval">---</div>
  </div>
  <div style="text-align:right">
    <div class="vlbl">読み上げ内容</div>
    <div class="vspeech" id="vspeech">-</div>
  </div>
</div>

<div class="trow">
  <div class="ring">
    <svg class="rsvg" viewBox="0 0 42 42"><circle class="rtrk" cx="21" cy="21" r="18"/><circle class="rprg" id="rprg" cx="21" cy="21" r="18"/></svg>
    <div class="rn" id="rn">10</div>
  </div>
  <div><div class="tlbl">次の更新まで</div><div class="tst" id="tst">待機中</div></div>
</div>
<div class="lcard">
  <div class="lhdr"><span>更新履歴</span><div class="ldot"></div></div>
  <div class="llist" id="llist"><div class="litem" style="color:var(--dim);justify-content:center">開始ボタンを押してください</div></div>
</div>
<button class="bmain" id="bmain" onclick="toggleAuto()">▶ 自動読み上げ 開始</button>
<button class="bonce" onclick="doOnce()">今すぐ1回読み上げ</button>
<div class="err" id="errmsg"></div>
<div class="note" id="note"><b>最初に「自動読み上げ 開始」をタップ</b><br>すると音声が有効になります</div>
</div>
<script>
var running = false;
var mainInterval = null;  // setInterval ID (メインループ)
var cntTmr = null;        // カウントダウン用 setInterval
var cd = 10;
var lastRate = null;
var spReady = false;
var CIRC = 113;
var lastMin5 = -1;
var speakQueue = [];
var isSpeaking = false;

var KANA = [‘ぜろ’,‘いち’,‘にぃ’,‘さん’,‘よん’,‘ごー’,‘ろく’,‘なな’,‘はち’,‘きゅう’];

// ───── 数字→かな変換 ─────
function rateText(rate) {
var s = rate.toFixed(3).split(’.’);
var r = ‘’;
for (var i = 0; i < s[0].length; i++) r += KANA[parseInt(s[0][i])];
r += ’ てん ’;
for (var j = 0; j < s[1].length; j++) r += KANA[parseInt(s[1][j])];
return r;
}

// 変動値をかな読みに変換（例: +0.023 → 「プラス 0.023円」）
function diffText(diff) {
if (diff === null) return ‘’;
var abs = Math.abs(diff);
if (abs < 0.001) return ‘まえかいとおなじ’;
var sign = diff > 0 ? ‘ぷらす’ : ‘まいなす’;
var s = abs.toFixed(3).split(’.’);
var r = sign + ’ ’;
for (var i = 0; i < s[0].length; i++) r += KANA[parseInt(s[0][i])];
r += ’ てん ‘;
for (var j = 0; j < s[1].length; j++) r += KANA[parseInt(s[1][j])];
r += ’ えん’;
return r;
}

// ───── API取得チェーン ─────
// 1st: freeforexapi.com (キー不要・リアルタイム数秒更新)
function fetchRate(cb) {
var x = new XMLHttpRequest();
x.open(‘GET’, ‘https://www.freeforexapi.com/api/live?pairs=USDJPY’, true);
x.timeout = 7000;
x.onreadystatechange = function() {
if (x.readyState === 4) {
if (x.status === 200) {
try {
var d = JSON.parse(x.responseText);
var v = d && d.rates && d.rates.USDJPY && d.rates.USDJPY.rate;
if (v && v > 50 && v < 300) { cb(null, parseFloat(v)); return; }
} catch(e) {}
}
fetchRateA(cb);
}
};
x.ontimeout = function() { fetchRateA(cb); };
x.onerror = function() { fetchRateA(cb); };
x.send();
}

// 2nd: Twelve Data (無料枠・リアルタイム、キー不要の公開エンドポイント)
function fetchRateA(cb) {
var x = new XMLHttpRequest();
x.open(‘GET’, ‘https://api.twelvedata.com/price?symbol=USD/JPY&apikey=demo’, true);
x.timeout = 7000;
x.onreadystatechange = function() {
if (x.readyState === 4) {
if (x.status === 200) {
try {
var d = JSON.parse(x.responseText);
var v = d && d.price;
if (v && parseFloat(v) > 50 && parseFloat(v) < 300) { cb(null, parseFloat(v)); return; }
} catch(e) {}
}
fetchRateB(cb);
}
};
x.ontimeout = function() { fetchRateB(cb); };
x.onerror = function() { fetchRateB(cb); };
x.send();
}

// 3rd: Finnhub (キー付き・準リアルタイム)
function fetchRateB(cb) {
var x = new XMLHttpRequest();
x.open(‘GET’, ‘https://finnhub.io/api/v1/quote?symbol=OANDA%3AUSD_JPY&token=d6l3mlpr01qptf3ompl0d6l3mlpr01qptf3omplg’, true);
x.timeout = 7000;
x.onreadystatechange = function() {
if (x.readyState === 4) {
if (x.status === 200) {
try {
var d = JSON.parse(x.responseText), v = d.c || d.l;
if (v && v > 50 && v < 300) { cb(null, parseFloat(v)); return; }
} catch(e) {}
}
fetchRateC(cb);
}
};
x.ontimeout = function() { fetchRateC(cb); };
x.onerror = function() { fetchRateC(cb); };
x.send();
}

// 4th: Frankfurter (日次・最終フォールバック)
function fetchRateC(cb) {
var x = new XMLHttpRequest();
x.open(‘GET’, ‘https://api.frankfurter.app/latest?from=USD&to=JPY’, true);
x.timeout = 8000;
x.onreadystatechange = function() { if (x.readyState === 4) { if (x.status === 200) { try { var d = JSON.parse(x.responseText), v = d.rates && d.rates.JPY; if (v && v > 50 && v < 300) { cb(null, parseFloat(v)); return; } } catch(e) {} } cb(‘全API失敗’, null); } };
x.ontimeout = function() { cb(‘タイムアウト’, null); };
x.onerror = function() { cb(‘ネットワークエラー’, null); };
x.send();
}

// ───── メインフェッチ ─────
function doFetch() {
clearErr();
fetchRate(function(err, rate) {
if (err || rate === null) { showErr(’取得失敗: ’ + (err || ‘null’)); return; }
var prev = lastRate;
var diff = (prev !== null) ? (rate - prev) : null;
updateDisplay(rate, diff);
updateDiffPanel(diff, rate);
addLog(rate, diff);
lastRate = rate;
buildAndSpeak(rate, diff);
});
}

function doOnce() { initSpeech(); doFetch(); }

// ───── 表示更新 ─────
function updateDisplay(rate, diff) {
var card = document.getElementById(‘rcard’);
var el = document.getElementById(‘rnum’);
var bc = document.getElementById(‘bchg’);
var bs = document.getElementById(‘bsrg’);
var s = rate.toFixed(3).split(’.’);
el.innerHTML = s[0] + ‘<span class="rdec">.’ + s[1] + ‘</span>’;
el.className = ‘rnum’; card.className = ‘rcard’;
if (diff !== null) {
var sign = diff >= 0 ? ‘+’ : ‘’;
var arrow = diff > 0.001 ? ‘↑’ : diff < -0.001 ? ‘↓’ : ‘→’;
bc.textContent = arrow + ’ ’ + sign + diff.toFixed(3) + ’ 円’;
var cls = diff > 0.001 ? ‘up’ : diff < -0.001 ? ‘dn’ : ‘nc’;
bc.className = ‘badge bchg ’ + cls + ’ show’;
if (diff > 0.001) { card.className = ‘rcard bull’; }
else if (diff < -0.001) { el.className = ‘rnum bear’; card.className = ‘rcard bear’; }
var thr = 0.03;
if (Math.abs(diff) >= thr) {
bs.textContent = diff > 0 ? ‘急騰！’ : ‘急落！’;
bs.className = ‘badge bsrg show’;
setTimeout(function() { bs.className = ‘badge bsrg’; }, 8000);
}
}
}

function updateDiffPanel(diff, rate) {
var vv = document.getElementById(‘vval’);
var vs = document.getElementById(‘vspeech’);
if (diff === null) { vv.textContent = ‘初回取得’; vv.className = ‘vval’; vs.textContent = rateText(rate); return; }
var sign = diff >= 0 ? ‘+’ : ‘’;
vv.textContent = sign + diff.toFixed(3) + ’ 円’;
vv.className = ’vval ’ + (diff > 0.001 ? ‘up’ : diff < -0.001 ? ‘dn’ : ‘’);
var dkana = diffText(diff);
vs.textContent = rateText(rate) + ‘、’ + dkana;
}

// ───── 音声合成：安定キュー方式 ─────
function initSpeech() {
if (spReady || !window.speechSynthesis) return;
var u = new SpeechSynthesisUtterance(’’);
u.volume = 0; u.lang = ‘ja-JP’;
window.speechSynthesis.speak(u);
spReady = true;
document.getElementById(‘note’).style.display = ‘none’;
}

// キューに積んでシリアル再生
function enqueueSpeak(text) {
speakQueue.push(text);
if (!isSpeaking) drainQueue();
}

function drainQueue() {
if (speakQueue.length === 0) { isSpeaking = false; document.getElementById(‘sbar’).className = ‘sbar’; return; }
isSpeaking = true;
var text = speakQueue.shift();
document.getElementById(‘sbar’).className = ‘sbar on’;

if (!window.speechSynthesis) { isSpeaking = false; return; }
window.speechSynthesis.cancel();

var u = new SpeechSynthesisUtterance(text);
u.lang = ‘ja-JP’; u.rate = 0.85; u.pitch = 1.0; u.volume = 1.0;

// iOS Safariは長い発話で止まるためkickが必要
var kick = null;
function startKick() {
kick = setInterval(function() {
if (!window.speechSynthesis.speaking) { clearInterval(kick); return; }
window.speechSynthesis.pause();
window.speechSynthesis.resume();
}, 5000);
}

u.onstart = function() { startKick(); };
u.onend = function() { clearInterval(kick); drainQueue(); };
u.onerror = function() { clearInterval(kick); isSpeaking = false; document.getElementById(‘sbar’).className = ‘sbar’; };

window.speechSynthesis.resume();
window.speechSynthesis.speak(u);
}

// 読み上げテキスト構築（レート＋変動値）
function buildAndSpeak(rate, diff) {
var parts = [];

// 急騰・急落プレフィックス
if (diff !== null && Math.abs(diff) >= 0.03) {
parts.push(diff > 0 ? ‘きゅうとうです’ : ‘きゅうらくです’);
}

// レート読み上げ
parts.push(rateText(rate));

// 変動値読み上げ（必ず付ける）
if (diff !== null) {
var dkana = diffText(diff);
parts.push(dkana);
}

// 5分ごとに時刻
var m = new Date().getMinutes();
if (m % 5 === 0 && m !== lastMin5) {
lastMin5 = m;
parts.push(timeText());
}

var txt = parts.join(’。’);
// vspeechに表示
document.getElementById(‘vspeech’).textContent = txt;
enqueueSpeak(txt);
}

function timeText() {
var n = new Date(), h = n.getHours(), m = n.getMinutes();
var H = [‘ぜろ’,‘いち’,‘にぃ’,‘さん’,‘よん’,‘ごー’,‘ろく’,‘なな’,‘はち’,‘きゅう’,‘じゅう’,‘じゅういち’,‘じゅうにぃ’,‘じゅうさん’,‘じゅうよん’,‘じゅうごー’,‘じゅうろく’,‘じゅうなな’,‘じゅうはち’,‘じゅうきゅう’,‘にぃじゅう’,‘にぃじゅういち’,‘にぃじゅうにぃ’,‘にぃじゅうさん’];
var M = [‘ぜろぜろ’,‘ぜろいち’,‘ぜろにぃ’,‘ぜろさん’,‘ぜろよん’,‘ぜろごー’,‘ぜろろく’,‘ぜろなな’,‘ぜろはち’,‘ぜろきゅう’,‘じゅう’,‘じゅういち’,‘じゅうにぃ’,‘じゅうさん’,‘じゅうよん’,‘じゅうごー’,‘じゅうろく’,‘じゅうなな’,‘じゅうはち’,‘じゅうきゅう’,‘にぃじゅう’,‘にぃじゅういち’,‘にぃじゅうにぃ’,‘にぃじゅうさん’,‘にぃじゅうよん’,‘にぃじゅうごー’,‘にぃじゅうろく’,‘にぃじゅうなな’,‘にぃじゅうはち’,‘にぃじゅうきゅう’,‘さんじゅう’,‘さんじゅういち’,‘さんじゅうにぃ’,‘さんじゅうさん’,‘さんじゅうよん’,‘さんじゅうごー’,‘さんじゅうろく’,‘さんじゅうなな’,‘さんじゅうはち’,‘さんじゅうきゅう’,‘よんじゅう’,‘よんじゅういち’,‘よんじゅうにぃ’,‘よんじゅうさん’,‘よんじゅうよん’,‘よんじゅうごー’,‘よんじゅうろく’,‘よんじゅうなな’,‘よんじゅうはち’,‘よんじゅうきゅう’,‘ごじゅう’,‘ごじゅういち’,‘ごじゅうにぃ’,‘ごじゅうさん’,‘ごじゅうよん’,‘ごじゅうごー’,‘ごじゅうろく’,‘ごじゅうなな’,‘ごじゅうはち’,‘ごじゅうきゅう’];
return ‘げんざい’ + (H[h] || h) + ‘じ’ + (m === 0 ? ‘ちょうど’ : (M[m] || m) + ‘ふん’) + ‘です’;
}

// ───── 安定インターバル制御 ─────
// setInterval 1本でズレを防ぐ
function toggleAuto() { initSpeech(); if (running) stopAuto(); else startAuto(); }

function startAuto() {
running = true;
document.getElementById(‘bmain’).textContent = ‘■ 自動読み上げ 停止’;
document.getElementById(‘bmain’).className = ‘bmain active’;
document.getElementById(‘tst’).textContent = ‘10秒ごとに更新中’;

doFetch();       // 即時1回
startCountdown();

// setInterval で正確10秒ループ
mainInterval = setInterval(function() {
if (!running) return;
doFetch();
startCountdown();
}, 10000);
}

function stopAuto() {
running = false;
clearInterval(mainInterval); mainInterval = null;
clearInterval(cntTmr); cntTmr = null;
document.getElementById(‘bmain’).textContent = ‘▶ 自動読み上げ 開始’;
document.getElementById(‘bmain’).className = ‘bmain’;
document.getElementById(‘tst’).textContent = ‘停止中’;
resetRing();
}

function startCountdown() {
clearInterval(cntTmr);
cd = 10; updateRing();
cntTmr = setInterval(function() {
cd–;
if (cd < 0) cd = 0;
updateRing();
if (cd <= 0) clearInterval(cntTmr);
}, 1000);
}

function updateRing() {
var p = document.getElementById(‘rprg’), n = document.getElementById(‘rn’);
n.textContent = cd;
p.style.strokeDashoffset = CIRC * (1 - cd / 10);
var hot = cd <= 3;
p.style.stroke = hot ? ‘var(–red)’ : ‘var(–green)’;
n.style.color = hot ? ‘var(–red)’ : ‘var(–green)’;
}
function resetRing() {
var p = document.getElementById(‘rprg’), n = document.getElementById(‘rn’);
n.textContent = ‘10’; n.style.color = ‘var(–green)’;
p.style.strokeDashoffset = 0; p.style.stroke = ‘var(–green)’;
}

// ───── 履歴ログ ─────
function addLog(rate, diff) {
var list = document.getElementById(‘llist’);
if (list.children.length === 1 && list.children[0].style.justifyContent === ‘center’) list.innerHTML = ‘’;
while (list.children.length >= 12) list.removeChild(list.lastChild);
var now = new Date().toLocaleTimeString(‘ja-JP’, {hour:‘2-digit’, minute:‘2-digit’, second:‘2-digit’});
var cls = ‘nc’, dstr = ‘’;
if (diff !== null) {
dstr = (diff >= 0 ? ‘+’ : ‘’) + diff.toFixed(3);
cls = diff > 0.001 ? ‘up’ : diff < -0.001 ? ‘dn’ : ‘nc’;
}
var dcol = cls === ‘up’ ? ‘var(–green)’ : cls === ‘dn’ ? ‘var(–red)’ : ‘var(–dim)’;
var item = document.createElement(‘div’); item.className = ‘litem’;
item.innerHTML = ‘<span class="ltm">’ + now + ‘</span><span class="lrt ' + cls + '">’ + rate.toFixed(3) + ‘</span><span class="ldf" style="color:' + dcol + '">’ + dstr + ‘</span>’;

function showErr(m) { document.getElementById(‘errmsg’).textContent = m; }
function clearErr() { document.getElementById(‘errmsg’).textContent = ‘’; }

// ───── iOS バックグラウンド復帰対策 ─────
// Page Visibility API: タブ復帰時に speechSynthesis をリセット
document.addEventListener(‘visibilitychange’, function() {
if (!document.hidden && running) {
// 画面復帰時に音声エンジンをリフレッシュ
if (window.speechSynthesis) {
window.speechSynthesis.cancel();
isSpeaking = false;
speakQueue = [];
}
}
});

// pageshow (iOS bfcache 復帰)
window.addEventListener(‘pageshow’, function(e) {
if (e.persisted && running) {
if (window.speechSynthesis) {
window.speechSynthesis.cancel();
isSpeaking = false;
speakQueue = [];
}
}
});
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ドル円 読み上げ</title>
<style>
:root{--bg:#080810;--sf:#10101a;--sf2:#16162a;--green:#00e5a0;--blue:#00b8ff;--red:#ff4560;--yellow:#ffb300;--txt:#e8e8f2;--dim:#4a4a6a;--bd:#1a1a2e}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:420px;padding:16px 14px 48px;display:flex;flex-direction:column;gap:10px}
.hdr{text-align:center;padding:4px 0 8px}
.hdr-s{font-size:10px;letter-spacing:5px;color:var(--green);opacity:.7;text-transform:uppercase}
.hdr-t{font-size:20px;letter-spacing:3px;color:var(--txt);opacity:.35;font-weight:300}
.rcard{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:20px 16px 16px;text-align:center;transition:border-color .4s,box-shadow .4s}
.rnum{font-size:64px;line-height:1;font-weight:900;letter-spacing:-1px;color:var(--green)}
.rdec{font-size:34px;opacity:.75}
.badges{display:flex;justify-content:center;gap:8px;margin-top:8px}
.badge{padding:3px 10px;border-radius:16px;font-size:12px;font-weight:700}
.bchg{background:rgba(0,229,160,.15);color:var(--green)}
.sbar{display:flex;align-items:flex-end;gap:3px;height:18px;opacity:0;transition:opacity .3s}
.sbar.on{opacity:1}
.sb{width:3px;border-radius:2px;background:var(--blue);animation:sd .45s ease-in-out infinite alternate}
@keyframes sd{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
</style>
</head>

<body>

<div class="wrap">

<div class="hdr">
<div class="hdr-s">Live Forex</div>
<div class="hdr-t">ドル円 読み上げ</div>
</div>

<div class="rcard">
<div class="pair">USD / JPY</div>
<div class="rnum" id="rnum">---<span class="rdec">.---</span></div>
<div class="badges">
<div class="badge bchg" id="bchg"></div>
</div>

<div class="sbar" id="sbar">
<div class="sb"></div>
<div class="sb"></div>
<div class="sb"></div>
</div>

</div>

<button onclick="toggleAuto()">自動読み上げ</button>

</div>

<script>

var running=false
var lastRate=null

var KANA=['ぜろ','いち','に','さん','よん','ご','ろく','なな','はち','きゅう']

function rateText(rate){

var s=rate.toFixed(3)
var p=s.split('.')

var r=''

for(var i=0;i<p[0].length;i++){

r+=KANA[parseInt(p[0][i])]

}

r+=' てん '

for(var i=0;i<p[1].length;i++){

r+=KANA[parseInt(p[1][i])]

}

return r

}


function speak(text){

var u=new SpeechSynthesisUtterance(text)

u.lang='ja-JP'

u.rate=0.9

speechSynthesis.cancel()

speechSynthesis.speak(u)

}


function update(rate){

var el=document.getElementById("rnum")

var s=rate.toFixed(3).split('.')

el.innerHTML=s[0]+'<span class="rdec">.'+s[1]+'</span>'


if(lastRate!=null){

var diff=rate-lastRate

var txt=rateText(rate)

txt+="。変動 "

txt+=diff.toFixed(3)

txt+=" 円"

speak(txt)

}

lastRate=rate

}



function fetchRate(){

fetch("https://api.exchangerate.host/convert?from=USD&to=JPY")

.then(r=>r.json())

.then(d=>{

var rate=d.result

if(rate>50 && rate<300){

update(rate)

}

})

.catch(()=>{})

}


function loop(){

if(!running)return

fetchRate()

setTimeout(loop,10000)

}


function toggleAuto(){

running=!running

if(running){

loop()

}

}

</script>

</body>
</html>
